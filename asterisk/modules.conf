; modules.conf - Required modules for RoboFang AED
; =============================================

[modules]
autoload=yes

; Preload PJSIP
preload => res_pjsip.so
preload => res_pjsip_endpoint_identifier_ip.so
preload => res_pjsip_endpoint_identifier_user.so
preload => res_pjsip_outbound_registration.so

; Critical Bridge Modules
load => res_ari.so
load => res_ari_model.so
load => res_ari_events.so
load => res_stasis.so
load => res_stasis_answer.so
load => res_stasis_playback.so
load => res_audiosocket.so

; Core Audio
load => codec_ulaw.so
load => codec_alaw.so
load => codec_g722.so
load => codec_gsm.so
load => format_wav.so
load => format_pcm.so
load => format_sln.so
