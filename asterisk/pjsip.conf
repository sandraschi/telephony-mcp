; pjsip.conf - SOTA 2026 SIP Configuration for RoboFang Beta
; ==============================================================

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0

; --- REGISTER with Austrian Provider (e.g., fonira / peoplefone) ---
; REPLACE these with your actual credentials
[provider-reg]
type=registration
outbound_auth=provider-auth
server_uri=sip:YOUR_SIP_DOMAIN
client_uri=sip:YOUR_USER@YOUR_SIP_DOMAIN
retry_interval=60

[provider-auth]
type=auth
auth_type=userpass
password=YOUR_PASSWORD
username=YOUR_USER

[provider-endpoint]
type=endpoint
context=from-external
disallow=all
allow=alaw,ulaw,g722
outbound_auth=provider-auth
aors=provider-aor

[provider-aor]
type=aor
contact=sip:YOUR_SIP_DOMAIN

; --- LOCAL TEST ENDPOINT (For Linphone/Softphone Testing) ---
[linphone-auth]
type=auth
auth_type=userpass
password=testpass
username=linphone

[linphone-aor]
type=aor
max_contacts=5

[linphone]
type=endpoint
context=from-internal
disallow=all
allow=ulaw,alaw
auth=linphone-auth
outbound_auth=linphone-auth
aors=linphone-aor
