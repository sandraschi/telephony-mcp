; extensions.conf - RoboFang Dialplan
; ===================================

[general]
static=yes
writeprotect=no

[from-internal]
; Stasis application is where RoboFang (ARI) takes control
exten => _X.,1,NoOp(RoboFang Outbound Call)
 same => n,Stasis(robofang)
 same => n,Hangup()

[from-external]
; Handle incoming calls if we have existing numbers
exten => s,1,NoOp(Incoming Call to Fleet)
 same => n,Stasis(robofang)
 same => n,Hangup()
